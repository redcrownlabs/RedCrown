name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Windows verification
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component clippy,rustfmt
          rustup default 1.88.0

      - name: Install desktop dependencies
        run: npm ci --prefix ./apps/desktop

      - name: Check formatting
        run: ./scripts/tasks.ps1 fmt

      - name: Lint
        run: ./scripts/tasks.ps1 lint

      - name: Test
        run: ./scripts/tasks.ps1 test

      - name: Build
        run: ./scripts/tasks.ps1 build

  dependency-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust lockfile
        run: cargo audit --file backend/Cargo.lock
