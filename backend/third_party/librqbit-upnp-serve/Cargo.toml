[package]
name = "librqbit-upnp-serve"
version = "1.0.1"
edition = "2021"
description = "Simple UPnP MediaServer implementation"
documentation = "https://docs.rs/librqbit-upnp-serve"
readme = "README.md"
license = "Apache-2.0"
repository = "https://github.com/ikatson/rqbit"
keywords = ["upnp", "dlna", "media-server"]
categories = ["multimedia", "network-programming"]

[features]
default = ["sha1-crypto-hash"]
sha1-crypto-hash = [
    "librqbit-sha1-wrapper/sha1-crypto-hash",
    "librqbit-core/sha1-crypto-hash",
]
sha1-ring = [
    "librqbit-sha1-wrapper/sha1-ring",
    "librqbit-core/sha1-ring",
]

[dependencies]
anyhow = "1.0.86"
axum = { version = "0.8", features = ["tokio"] }
bstr = "1.10.0"
futures = "0.3.30"
gethostname = "1"
http = "1.1.0"
httparse = "1.9.4"
librqbit-core = { version = "5", default-features = false }
librqbit-sha1-wrapper = { version = "4", default-features = false }
librqbit-upnp = { version = "1", default-features = false }
mime_guess = "2.0.5"
network-interface = "2.0.0"
parking_lot = "0.12.3"
quick-xml = { version = "0.41", features = ["serialize"] }
reqwest = { version = "0.12.7", default-features = false }
serde = { version = "1", features = ["derive"] }
socket2 = "0.5.7"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7.11"
tracing = "0.1.40"
url = { version = "2", default-features = false }
uuid = { version = "1.10.0", features = ["v4"] }

[dev-dependencies]
tower-http = { version = "0.6.2", features = ["trace"] }
tracing-subscriber = "0.3.18"
