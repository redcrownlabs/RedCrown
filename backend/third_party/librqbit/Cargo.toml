[package]
edition = "2024"
name = "librqbit"
version = "9.0.0-rc.0"
authors = ["Igor Katson <igor.katson@gmail.com>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "The main library used by rqbit torrent client. The binary is just a small wrapper on top of it."
documentation = "https://docs.rs/librqbit"
readme = "README.md"
license = "Apache-2.0"
repository = "https://github.com/ikatson/rqbit"
keywords = ["bittorrent", "torrent"]
categories = ["network-programming"]
resolver = "2"

[features]
_disable_disk_write_net_benchmark = []
_disable_reconnect_test = []
async-bt = ["async-backtrace"]
default = [
    "default-tls",
    "http-api-client",
]
default-tls = [
    "reqwest/default-tls",
    "sha1w/sha1-crypto-hash",
    "librqbit-core/sha1-crypto-hash",
]
disable-upload = []
http-api = [
    "axum",
    "tower-http",
]
http-api-client = []
miri = []
postgres = [
    "sqlx",
    "home",
]
prometheus = ["metrics-exporter-prometheus"]
rust-tls = [
    "reqwest/rustls-tls",
    "sha1w/sha1-ring",
    "librqbit-core/sha1-ring",
]
storage_examples = []
storage_middleware = ["lru"]
timed_existence = []
tokio-console = [
    "console-subscriber",
    "tokio/tracing",
]
tracing-subscriber-utils = ["tracing-subscriber"]
upnp-serve-adapter = ["upnp-serve"]
watch = ["notify"]
webui = []

[lib]
name = "librqbit"
path = "src/lib.rs"

[[example]]
name = "custom_storage"
path = "examples/custom_storage.rs"

[[example]]
name = "simulate_traffic"
path = "examples/simulate_traffic.rs"
required-features = [
    "http-api",
    "webui",
    "tracing-subscriber-utils",
    "prometheus",
]

[[example]]
name = "ubuntu"
path = "examples/ubuntu.rs"

